<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Ôn Thi Trắc Nghiệm Tiếng Anh 2 (TA2)</title>
  
  <!-- Google Fonts: Inter and Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Reset & CSS variables */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    :root {
      --bg-gradient: radial-gradient(circle at top left, #0d1224, #070913);
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(124, 58, 237, 0.15);
      --card-border-hover: rgba(139, 92, 246, 0.4);
      --primary: #7c3aed;
      --primary-glow: rgba(124, 58, 237, 0.35);
      --secondary: #ec4899;
      --accent-blue: #3b82f6;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      
      --correct: #10b981;
      --correct-bg: rgba(16, 185, 129, 0.15);
      --correct-border: rgba(16, 185, 129, 0.4);
      
      --incorrect: #ef4444;
      --incorrect-bg: rgba(239, 68, 68, 0.15);
      --incorrect-border: rgba(239, 68, 68, 0.4);
      
      --unanswered: #4b5563;
      --glass-filter: blur(16px);
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: var(--glass-filter);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand i {
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 12px var(--primary-glow));
    }

    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand span {
      background: linear-gradient(135deg, #a78bfa, var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .subject-switch-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .subject-switch-btn:hover {
      background: rgba(124, 58, 237, 0.2);
      border-color: rgba(124, 58, 237, 0.4);
      color: #fff;
      transform: translateY(-1px);
    }

    /* Main layout container */
    .container {
      display: flex;
      max-width: 1600px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      gap: 2rem;
      width: 100%;
      flex: 1;
    }

    /* Left pane */
    .left-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 1000px;
    }

    /* Right pane */
    .right-pane {
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      position: sticky;
      top: 5.5rem;
      height: calc(100vh - 7rem);
    }

    /* Panel styling */
    .panel {
      background: var(--card-bg);
      backdrop-filter: var(--glass-filter);
      border: 1px solid var(--card-border);
      border-radius: 1rem;
      padding: 1.25rem;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      transition: all 0.3s ease;
    }

    .panel:hover {
      border-color: rgba(124, 58, 237, 0.25);
    }

    /* Stats Panel */
    .stats-header {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.5rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 0.75rem;
      padding: 0.6rem;
      text-align: center;
    }

    .stat-val {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
    }

    .stat-val.correct { color: var(--correct); }
    .stat-val.incorrect { color: var(--incorrect); }
    .stat-val.progress { color: #3b82f6; }

    .stat-lbl {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Progress bar */
    .progress-bar-container {
      background: rgba(255, 255, 255, 0.05);
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin: 0.75rem 0;
      position: relative;
    }

    .progress-bar {
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      height: 100%;
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    /* Action Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border-radius: 0.75rem;
      padding: 0.7rem 1.25rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: #fff;
      box-shadow: 0 4px 14px 0 var(--primary-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(124, 58, 237, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* Grid layout */
    .grid-container {
      flex: 1;
      overflow-y: auto;
      margin-top: 0.5rem;
      padding-right: 0.25rem;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(124, 58, 237, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(124, 58, 237, 0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 0.35rem;
    }

    .grid-btn {
      aspect-ratio: 1;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .grid-btn:hover {
      border-color: var(--primary);
      color: #fff;
      transform: scale(1.08);
    }

    .grid-btn.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      color: var(--correct);
    }

    .grid-btn.incorrect {
      background: var(--incorrect-bg);
      border-color: var(--incorrect-border);
      color: var(--incorrect);
    }

    .grid-btn.answered {
      background: rgba(124, 58, 237, 0.1);
      border-color: rgba(124, 58, 237, 0.3);
      color: #c084fc;
    }

    .grid-btn.active {
      outline: 2px solid #3b82f6;
      outline-offset: 1px;
    }

    /* Filters section */
    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    .filter-btn {
      padding: 0.45rem 0.85rem;
      border-radius: 9999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      color: var(--text-main);
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    /* Search Bar */
    .search-container {
      position: relative;
      width: 100%;
    }

    .search-container i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .search-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.75rem;
      padding: 0.7rem 1rem 0.7rem 2.5rem;
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 8px var(--primary-glow);
    }

    /* Settings section */
    .settings-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .mode-toggle {
      flex: 1;
      display: flex;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.25rem;
      border-radius: 0.75rem;
    }

    .mode-btn {
      flex: 1;
      padding: 0.45rem;
      border-radius: 0.5rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .mode-btn.active {
      background: rgba(124, 58, 237, 0.2);
      border: 1px solid rgba(124, 58, 237, 0.3);
      color: #c084fc;
    }

    /* Question Card */
    .question-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      padding-bottom: 10rem;
    }

    .card {
      position: relative;
      opacity: 0;
      animation: fadeIn 0.2s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .q-number {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: #c084fc;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .unit-badge {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
      font-weight: 600;
      margin-left: 0.5rem;
    }

    .q-status-badge {
      font-size: 0.72rem;
      padding: 0.15rem 0.55rem;
      border-radius: 9999px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .q-status-badge.correct {
      background: var(--correct-bg);
      color: var(--correct);
      border: 1px solid var(--correct-border);
    }

    .q-status-badge.incorrect {
      background: var(--incorrect-bg);
      color: var(--incorrect);
      border: 1px solid var(--incorrect-border);
    }

    .q-status-badge.unanswered {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .q-text {
      font-size: 1.02rem;
      line-height: 1.55;
      margin-bottom: 1.25rem;
      white-space: pre-line;
    }

    /* Options */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .option:hover:not(.disabled) {
      background: rgba(124, 58, 237, 0.08);
      border-color: rgba(124, 58, 237, 0.25);
      transform: translateX(4px);
    }

    .option-letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .option-text {
      font-size: 0.92rem;
      line-height: 1.4;
      flex: 1;
    }

    /* Option States */
    .option.selected {
      background: rgba(124, 58, 237, 0.15);
      border-color: rgba(124, 58, 237, 0.4);
    }

    .option.selected .option-letter {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .option.correct-choice {
      background: var(--correct-bg) !important;
      border-color: var(--correct-border) !important;
    }

    .option.correct-choice .option-letter {
      background: var(--correct) !important;
      border-color: var(--correct) !important;
      color: #fff !important;
    }

    .option.incorrect-choice {
      background: var(--incorrect-bg) !important;
      border-color: var(--incorrect-border) !important;
    }

    .option.incorrect-choice .option-letter {
      background: var(--incorrect) !important;
      border-color: var(--incorrect) !important;
      color: #fff !important;
    }

    .option.disabled {
      cursor: default;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--primary);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-size: 0.9rem;
      color: var(--text-main);
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Mobile panel trigger */
    .mobile-stats-trigger {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      box-shadow: 0 4px 20px var(--primary-glow);
      z-index: 99;
      cursor: pointer;
    }

    /* Empty state */
    .no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .no-results i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .container {
        padding: 1rem;
      }
      .right-pane {
        position: fixed;
        top: 0;
        right: 0;
        width: 320px;
        height: 100vh;
        z-index: 200;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        border-radius: 0;
      }

      .right-pane.show {
        transform: translateX(0);
      }

      .mobile-stats-trigger {
        display: flex;
      }

      .close-panel-btn {
        display: block !important;
      }
    }

    .close-panel-btn {
      display: none;
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* Animations */
    .shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>

  <!-- Header Navigation -->
  <header>
    <div class="brand">
      <i class="fa-solid fa-graduation-cap"></i>
      <div>
        <h1>Ôn Thi <span>Tiếng Anh 2 (TA2)</span></h1>
        <div class="brand-subtitle">Revision Unit 6 • Unit 7 • Unit 8 • Unit 9 (153 Câu)</div>
      </div>
    </div>

    <div class="header-actions">
      <a href="index.html" class="subject-switch-btn" title="Chuyển sang môn Giáo Dục Chính Trị">
        <i class="fa-solid fa-book-open"></i> Môn GDCT K26
      </a>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    
    <!-- Left Pane: Controls & Questions -->
    <div class="left-pane">
      
      <!-- Panel 1: Mode Switcher & Filters -->
      <div class="panel">
        <div class="settings-row">
          <div class="mode-toggle">
            <button class="mode-btn active" id="mode-practice" onclick="setMode('practice')">
              <i class="fa-solid fa-bolt"></i> Chế độ Ôn tập
            </button>
            <button class="mode-btn" id="mode-exam" onclick="setMode('exam')">
              <i class="fa-solid fa-pen-to-square"></i> Chế độ Thi thử
            </button>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="search-container" style="margin-bottom: 0.75rem;">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-input" class="search-input" placeholder="Tìm kiếm nội dung câu hỏi hoặc đáp án..." oninput="handleSearch()">
        </div>

        <!-- Filters Bar -->
        <div class="filters-bar" id="filters-container">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Tất cả (153)</button>
          <button class="filter-btn" data-filter="unit6" onclick="setFilter('unit6')">Unit 6 (30)</button>
          <button class="filter-btn" data-filter="unit7" onclick="setFilter('unit7')">Unit 7 (39)</button>
          <button class="filter-btn" data-filter="unit8" onclick="setFilter('unit8')">Unit 8 (32)</button>
          <button class="filter-btn" data-filter="unit9" onclick="setFilter('unit9')">Unit 9 (52)</button>
          <button class="filter-btn" data-filter="undone" onclick="setFilter('undone')">Chưa làm (<span id="count-undone">153</span>)</button>
          <button class="filter-btn" data-filter="done" onclick="setFilter('done')">Đã làm (<span id="count-done">0</span>)</button>
          <button class="filter-btn" data-filter="correct" onclick="setFilter('correct')">Đúng (<span id="count-correct">0</span>)</button>
          <button class="filter-btn" data-filter="incorrect" onclick="setFilter('incorrect')">Sai (<span id="count-incorrect">0</span>)</button>
        </div>
      </div>

      <!-- Questions List -->
      <div class="question-list" id="questions-container">
        <!-- Rendered dynamically -->
      </div>

    </div>

    <!-- Right Pane: Statistics & Grid Navigator -->
    <div class="right-pane panel" id="right-panel">
      <button class="close-panel-btn" onclick="toggleMobilePanel()"><i class="fa-solid fa-xmark"></i></button>
      
      <div>
        <div class="stats-header">
          <span>Tiến Độ Học Tập</span>
          <span style="font-size: 0.85rem; font-weight: normal; color: var(--text-muted);" id="percent-label">0%</span>
        </div>
        
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-val progress" id="stat-done">0/153</div>
            <div class="stat-lbl">Đã trả lời</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="stat-score">0%</div>
            <div class="stat-lbl">Tỷ lệ đúng</div>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-box" style="border-color: rgba(16, 185, 129, 0.2);">
            <div class="stat-val correct" id="stat-correct">0</div>

    // State management
    let appState = {
      shuffledQuestions: [],
      userSelections: {}, // qId -> selected option index (0..3)
      mode: 'practice',   // 'practice' or 'exam'
      examSubmitted: false,
      filter: 'all',
      searchQuery: ''
    };

    let visibleCount = 20; // Lazy loading pagination
    let currentFilteredQuestions = [];

    // Local Storage keys
    const STORAGE_KEY_SELECTIONS = 'ta2_user_selections';
    const STORAGE_KEY_SHUFFLED = 'ta2_shuffled_questions';
    const STORAGE_KEY_MODE = 'ta2_app_mode';
    const STORAGE_KEY_EXAM_SUBMITTED = 'ta2_exam_submitted';

    // Initialize application
    function init() {
      loadProgress();
      
      if (!appState.shuffledQuestions || !Array.isArray(appState.shuffledQuestions) || appState.shuffledQuestions.length !== ORIGINAL_QUESTIONS.length || !appState.shuffledQuestions[0]?.shuffledOptions) {
        initShuffledQuestions();
      }

      applyFilterAndSearch();
      renderNavigationGrid();
      updateStats();
      updateUIControls();
    }

    // Prepare shuffled options structure
    function initShuffledQuestions() {
      appState.shuffledQuestions = ORIGINAL_QUESTIONS.map(q => {
        const optionsList = [
          { key: 'A', text: q.options.A },
          { key: 'B', text: q.options.B },
          { key: 'C', text: q.options.C },
          { key: 'D', text: q.options.D }
        ];

        return {
          id: q.id,
          unit: q.unit,
          unit_question_num: q.unit_question_num,
          question: q.question,
          correctAnswerText: q.options[q.answer],
          shuffledOptions: optionsList
        };
      });
      saveProgress();
    }

    // Shuffle option order for all questions
    function shuffleAnswersAll() {
      if (confirm('Bạn có muốn xáo trộn ngẫu nhiên thứ tự các đáp án A, B, C, D của tất cả câu hỏi không?')) {
        appState.shuffledQuestions.forEach(q => {
          if (q.shuffledOptions) q.shuffledOptions.sort(() => Math.random() - 0.5);
        });
        saveProgress();
        renderQuestionsList(false);
        showToast('Đã tráo ngẫu nhiên đáp án tất cả câu hỏi!');
      }
    }

    // Save state to localStorage
    function saveProgress() {
      localStorage.setItem(STORAGE_KEY_SELECTIONS, JSON.stringify(appState.userSelections));
      localStorage.setItem(STORAGE_KEY_SHUFFLED, JSON.stringify(appState.shuffledQuestions));
      localStorage.setItem(STORAGE_KEY_MODE, appState.mode);
      localStorage.setItem(STORAGE_KEY_EXAM_SUBMITTED, JSON.stringify(appState.examSubmitted));
    }

    // Load saved state
    function loadProgress() {
      try {
        const savedSelections = localStorage.getItem(STORAGE_KEY_SELECTIONS);
        const savedShuffled = localStorage.getItem(STORAGE_KEY_SHUFFLED);
        const savedMode = localStorage.getItem(STORAGE_KEY_MODE);
        const savedSubmitted = localStorage.getItem(STORAGE_KEY_EXAM_SUBMITTED);

        if (savedSelections) appState.userSelections = JSON.parse(savedSelections);
        if (savedShuffled) appState.shuffledQuestions = JSON.parse(savedShuffled);
        if (savedMode) appState.mode = savedMode;
        if (savedSubmitted) appState.examSubmitted = JSON.parse(savedSubmitted);
      } catch (e) {
        console.error('Error loading progress from localStorage:', e);
        appState.userSelections = {};
        appState.shuffledQuestions = [];
      }
    }

    // Reset progress
    function resetProgressConfirm() {
      if (confirm('Bạn có chắc chắn muốn xóa toàn bộ lịch sử làm bài để ôn tập lại từ đầu không?')) {
        appState.userSelections = {};
        appState.examSubmitted = false;
        saveProgress();
        applyFilterAndSearch();
        renderNavigationGrid();
        updateStats();
        updateUIControls();
        showToast('Đã đặt lại tiến độ học tập!');
      }
    }

    // Mode handling
    function setMode(mode) {
      if (appState.mode === mode) return;
      appState.mode = mode;
      saveProgress();
      updateUIControls();
      renderQuestionsList(false);
      renderNavigationGrid();
    }

    function updateUIControls() {
      document.getElementById('mode-practice').classList.toggle('active', appState.mode === 'practice');
      document.getElementById('mode-exam').classList.toggle('active', appState.mode === 'exam');

      const submitBtn = document.getElementById('submit-btn');
      if (appState.mode === 'exam' && !appState.examSubmitted) {
        submitBtn.style.display = 'flex';
      } else {
        submitBtn.style.display = 'none';
      }
    }

    // Filter handling
    function setFilter(filterType) {
      appState.filter = filterType;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filterType);
      });
      applyFilterAndSearch();
    }

    // Search handling
    function handleSearch() {
      appState.searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
      applyFilterAndSearch();
    }

    // Filter & Search Logic
    function applyFilterAndSearch() {
      currentFilteredQuestions = appState.shuffledQuestions.filter(q => {
        // Unit filters
        if (appState.filter === 'unit6' && q.unit !== 'Unit 6') return false;
        if (appState.filter === 'unit7' && q.unit !== 'Unit 7') return false;
        if (appState.filter === 'unit8' && q.unit !== 'Unit 8') return false;
        if (appState.filter === 'unit9' && q.unit !== 'Unit 9') return false;

        const isAnswered = appState.userSelections[q.id] !== undefined;
        const status = getQuestionStatus(q.id);

        if (appState.filter === 'undone' && isAnswered) return false;
        if (appState.filter === 'done' && !isAnswered) return false;
        if (appState.filter === 'correct' && status !== 'correct') return false;
        if (appState.filter === 'incorrect' && status !== 'incorrect') return false;

        // Search text matching
        if (appState.searchQuery) {
          const matchQ = q.question.toLowerCase().includes(appState.searchQuery);
          const matchOpt = q.shuffledOptions.some(opt => opt.text.toLowerCase().includes(appState.searchQuery));
          const matchUnit = q.unit.toLowerCase().includes(appState.searchQuery);
          if (!matchQ && !matchOpt && !matchUnit) return false;
        }

        return true;
      });

      visibleCount = 20;
      renderQuestionsList(false);
    }

    // Get question correctness status
    function getQuestionStatus(qId) {
      const selectedIdx = appState.userSelections[qId];
      if (selectedIdx === undefined) return 'unanswered';
      
      const q = appState.shuffledQuestions.find(x => x.id === qId);
      if (!q) return 'unanswered';

      const chosenOption = q.shuffledOptions[selectedIdx];
      if (chosenOption && chosenOption.text === q.correctAnswerText) {
        return 'correct';
      }
      return 'incorrect';
    }

    // Handle user selection of an option
    function selectOption(qId, optionIdx) {
      const q = appState.shuffledQuestions.find(x => x.id === qId);
      if (!q) return;

      const isAnswered = appState.userSelections[qId] !== undefined;
      
      // In practice mode or after exam submission, don't allow changing answered questions
      if (appState.mode === 'practice' && isAnswered) return;
      if (appState.mode === 'exam' && appState.examSubmitted) return;

      appState.userSelections[qId] = optionIdx;
      saveProgress();

      // Render updated card & stats
      renderQuestionCard(qId);
      updateGridItem(qId);
      updateStats();

      // In practice mode, if answer is wrong, shake card
      if (appState.mode === 'practice') {
        const status = getQuestionStatus(qId);
        if (status === 'incorrect') {
          const card = document.getElementById(`q-card-${qId}`);
          if (card) {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
          }
        }
      }
    }

    // Lazy load render questions list
    function renderQuestionsList(appendOnly = false) {
      const container = document.getElementById('questions-container');
      
      if (!appendOnly) {
        container.innerHTML = '';
      }

      const toRender = currentFilteredQuestions.slice(
        appendOnly ? container.children.length : 0,
        visibleCount
      );

      toRender.forEach(q => {
        if (document.getElementById(`q-card-${q.id}`)) return;

        const card = document.createElement('div');
        card.className = 'panel card';
        card.id = `q-card-${q.id}`;
        container.appendChild(card);
        buildCardContent(card, q);
      });

      // Handle no results empty state
      let noResults = document.getElementById('no-results-message');
      if (currentFilteredQuestions.length === 0) {
        if (!noResults) {
          noResults = document.createElement('div');
          noResults.id = 'no-results-message';
          noResults.className = 'no-results panel';
          noResults.innerHTML = `
            <i class="fa-regular fa-folder-open"></i>
            <p>Không tìm thấy câu hỏi nào phù hợp với bộ lọc hoặc từ khóa tìm kiếm.</p>
          `;
          container.appendChild(noResults);
        } else {
          noResults.style.display = 'block';
        }
      } else {
        if (noResults) noResults.style.display = 'none';
      }
    }

    // Infinite scroll load more
    function loadMoreQuestions() {
      if (visibleCount < currentFilteredQuestions.length) {
        visibleCount = Math.min(visibleCount + 15, currentFilteredQuestions.length);
        renderQuestionsList(true);
      }
    }

    window.addEventListener('scroll', () => {
      if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 600) {
        loadMoreQuestions();
      }
    });

    // Render single question card content
    function renderQuestionCard(qId) {
      const card = document.getElementById(`q-card-${qId}`);
      if (!card) return;
      const q = appState.shuffledQuestions.find(x => x.id === qId);
      if (!q) return;
      buildCardContent(card, q);
    }

    function buildCardContent(card, q) {
      const status = getQuestionStatus(q.id);
      const isAnswered = appState.userSelections[q.id] !== undefined;
      const showAnswers = (appState.mode === 'practice' && isAnswered) || (appState.mode === 'exam' && appState.examSubmitted);

      let statusBadge = '';
      if (showAnswers) {
        if (status === 'correct') {
          statusBadge = '<span class="q-status-badge correct"><i class="fa-solid fa-check"></i> Đúng</span>';
        } else {
          statusBadge = '<span class="q-status-badge incorrect"><i class="fa-solid fa-xmark"></i> Sai</span>';
        }
      } else if (isAnswered) {
        statusBadge = '<span class="q-status-badge unanswered" style="color:#c084fc; border-color: rgba(124, 58, 237, 0.3); background: rgba(124, 58, 237, 0.05);"><i class="fa-solid fa-pen"></i> Đã chọn</span>';
      } else {
        statusBadge = '<span class="q-status-badge unanswered">Chưa trả lời</span>';
      }

      let optionsHtml = '';
      const letters = ['A', 'B', 'C', 'D'];
      const selectedIdx = appState.userSelections[q.id];

      q.shuffledOptions.forEach((opt, idx) => {
        const isSelected = selectedIdx === idx;
        const isCorrectChoice = opt.text === q.correctAnswerText;
        
        let choiceClass = '';
        if (isSelected) choiceClass += ' selected';
        
        if (showAnswers) {
          if (isCorrectChoice) {
            choiceClass += ' correct-choice';
          } else if (isSelected && !isCorrectChoice) {
            choiceClass += ' incorrect-choice';
          }
          choiceClass += ' disabled';
        }

        optionsHtml += `
          <div class="option${choiceClass}" onclick="selectOption(${q.id}, ${idx})">
            <div class="option-letter">${letters[idx]}</div>
            <div class="option-text">${escapeHtml(opt.text)}</div>
          </div>
        `;
      });

      card.innerHTML = `
        <div class="q-number">
          <span>Câu ${q.id} <span class="unit-badge">${q.unit}</span></span>
          ${statusBadge}
        </div>
        <div class="q-text">${escapeHtml(q.question)}</div>
        <div class="options-grid">
          ${optionsHtml}
        </div>
      `;
    }

    // Render 1-153 grid navigator
    function renderNavigationGrid() {
      const grid = document.getElementById('navigation-grid');
      grid.innerHTML = '';

      appState.shuffledQuestions.forEach(q => {
        const btn = document.createElement('button');
        btn.id = `grid-btn-${q.id}`;
        btn.className = 'grid-btn';
        btn.textContent = q.id;
        
        updateGridItemClass(btn, q.id);

        btn.onclick = () => {
          document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const isFilteredOut = !currentFilteredQuestions.some(x => x.id === q.id);
          if (isFilteredOut) {
            setFilter('all');
          }

          const qIdx = currentFilteredQuestions.findIndex(x => x.id === q.id);
          if (qIdx !== -1) {
            if (qIdx >= visibleCount) {
              visibleCount = qIdx + 1;
              renderQuestionsList(true);
            }

            const card = document.getElementById(`q-card-${q.id}`);
            if (card) {
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
              card.style.borderColor = 'var(--primary)';
              setTimeout(() => {
                card.style.borderColor = 'var(--card-border)';
              }, 1000);
            }
          }

          if (window.innerWidth <= 1024) {
            toggleMobilePanel();
          }
        };

        grid.appendChild(btn);
      });
    }

    function updateGridItem(qId) {
      const btn = document.getElementById(`grid-btn-${qId}`);
      if (btn) {
        updateGridItemClass(btn, qId);
      }
    }

    function updateGridItemClass(btn, qId) {
      const status = getQuestionStatus(qId);
      const isAnswered = appState.userSelections[qId] !== undefined;
      const isExam = appState.mode === 'exam';

      btn.classList.remove('correct', 'incorrect', 'answered');

      if (isExam && !appState.examSubmitted) {
        if (isAnswered) btn.classList.add('answered');
      } else {
        if (status === 'correct') btn.classList.add('correct');
        else if (status === 'incorrect') btn.classList.add('incorrect');
      }
    }

    // Update Statistics
    function updateStats() {
      const total = appState.shuffledQuestions.length;
      let answeredCount = 0;
      let correctCount = 0;
      let incorrectCount = 0;

      appState.shuffledQuestions.forEach(q => {
        const isAnswered = appState.userSelections[q.id] !== undefined;
        if (isAnswered) {
          answeredCount++;
          const status = getQuestionStatus(q.id);
          if (status === 'correct') correctCount++;
          else if (status === 'incorrect') incorrectCount++;
        }
      });

      const unansweredCount = total - answeredCount;
      const percentDone = total > 0 ? Math.round((answeredCount / total) * 100) : 0;
      const scorePercent = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

      document.getElementById('stat-done').textContent = `${answeredCount}/${total}`;
      document.getElementById('stat-score').textContent = `${scorePercent}%`;
      document.getElementById('stat-correct').textContent = correctCount;
      document.getElementById('stat-incorrect').textContent = incorrectCount;
      
      document.getElementById('percent-label').textContent = `${percentDone}%`;
      document.getElementById('progress-bar').style.width = `${percentDone}%`;

      document.getElementById('count-done').textContent = answeredCount;
      document.getElementById('count-undone').textContent = unansweredCount;
      document.getElementById('count-correct').textContent = correctCount;
      document.getElementById('count-incorrect').textContent = incorrectCount;
    }

    // Submit Exam Mode
    function submitExam() {
      const answered = Object.keys(appState.userSelections).length;
      const total = appState.shuffledQuestions.length;
      
      if (answered < total) {
        if (!confirm(`Bạn mới làm ${answered}/${total} câu. Bạn có chắc muốn nộp bài chấm điểm ngay bây giờ không?`)) {
          return;
        }
      } else {
        if (!confirm('Bạn có chắc muốn nộp bài chấm điểm không?')) {
          return;
        }
      }

      appState.examSubmitted = true;
      document.getElementById('submit-btn').style.display = 'none';

      renderQuestionsList(false);
      renderNavigationGrid();
      updateStats();
      saveProgress();

      window.scrollTo({ top: 0, behavior: 'smooth' });

      let correct = 0;
      appState.shuffledQuestions.forEach(q => {
        if (getQuestionStatus(q.id) === 'correct') correct++;
      });

      const score10 = ((correct / total) * 10).toFixed(2);
      alert(`KẾT QUẢ THI THỬ TIẾNG ANH 2:\nSố câu đúng: ${correct}/${total}\nĐiểm số: ${score10}/10 điểm.\nBạn có thể dò lại các câu sai màu đỏ để ôn tập.`);
    }

    // Mobile drawer trigger
    function toggleMobilePanel() {
      const panel = document.getElementById('right-panel');
      panel.classList.toggle('show');
    }

    // Toast message helper
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
